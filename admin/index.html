<!DOCTYPE html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <section id="log"></section>
    <section id="content"></section>
    <section id="profil"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import {NewMenuForm} from './component/NewMenuForm/script.js';
      import {DataMenu} from './data/dataMenu.js';
    


      let Category = await DataMenu.requestCategory();

      window.C = {};

       C.handlerUpdate = async function(){
            
          let form = document.querySelector('.addMenu__form');
            let fd = new FormData(form);
            let res = await DataMenu.update(fd);
            V.renderLog(res);
        }

      C.start = function () {
        V.renderLog("Démarrage de l'application");
        V.renderMovies(Category, "C.handlerUpdate()");
      };

      window.V = {};

      V.renderLog = function (txt) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(txt);
      };
       V.renderMovies = function(Catagory,handler){
            let content = document.querySelector('#content');
            content.innerHTML = NewMenuForm.format(Catagory,handler);
        };

      C.start();
    </script>
  </body>
</html>
